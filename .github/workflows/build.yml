name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python tests/run_tests.py

  build-windows:
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: |
          python build_exe.py
      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSINT_FOX_GUI_${{ github.ref_name }}
          path: dist/OSINT_FOX/
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSINT_FOX_CLI_${{ github.ref_name }}
          path: dist/OSINT_FOX_CLI/
      - name: Create release archive
        run: |
          Compress-Archive -Path dist/OSINT_FOX -DestinationPath "OSINT_FOX_GUI_${{ github.ref_name }}.zip"
          Compress-Archive -Path dist/OSINT_FOX_CLI -DestinationPath "OSINT_FOX_CLI_${{ github.ref_name }}.zip"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OSINT_FOX_GUI_${{ github.ref_name }}.zip
            OSINT_FOX_CLI_${{ github.ref_name }}.zip
          generate_release_notes: true
